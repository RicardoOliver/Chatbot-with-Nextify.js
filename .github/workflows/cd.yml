name: CD Pipeline

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-prod:
    name: 🏗️ Build Production (nextify build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --production=false
      - name: Build with Nextify
        run: npm run build
        env:
          NODE_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/
          retention-days: 30

  deploy-staging:
    name: 🚧 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-prod
    environment:
      name: staging
      url: https://staging.ai-chatbot.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/
      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to staging..."
          # npx vercel --token=${{ secrets.VERCEL_TOKEN }} --env=staging
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🚧 *ai-chatbot* staging deploy *${{ job.status }}* — `${{ github.sha }}`"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: 🌐 Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://ai-chatbot.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/
      - name: Deploy to Production
        run: |
          echo "🌐 Deploying to production..."
          # npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deployment summary
        run: |
          echo "## 🤖 AI Chatbot Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://ai-chatbot.dev |" >> $GITHUB_STEP_SUMMARY
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🌐 *ai-chatbot* production deploy *${{ job.status }}* by `${{ github.actor }}`"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
