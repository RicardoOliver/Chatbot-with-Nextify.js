version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      react-ecosystem:
        patterns: ["react*", "@types/react*"]
      nextify:
        patterns: ["create-nextify", "nextify-monorepo"]
      markdown:
        patterns: ["react-markdown*", "remark-*", "react-syntax-highlighter*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
